<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0e0e1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Trilobite body - stylized oval -->
  <ellipse cx="32" cy="34" rx="16" ry="20" fill="none" stroke="#8B7355" stroke-width="2" opacity="0.6"/>
  <!-- Central axis line -->
  <line x1="32" y1="14" x2="32" y2="54" stroke="#8B7355" stroke-width="1.5" opacity="0.4"/>
  <!-- Segment lines -->
  <line x1="18" y1="28" x2="46" y2="28" stroke="#8B7355" stroke-width="1" opacity="0.3"/>
  <line x1="17" y1="34" x2="47" y2="34" stroke="#8B7355" stroke-width="1" opacity="0.3"/>
  <line x1="18" y1="40" x2="46" y2="40" stroke="#8B7355" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="46" x2="44" y2="46" stroke="#8B7355" stroke-width="1" opacity="0.3"/>
  <!-- Compound eyes - the defining trilobite feature -->
  <ellipse cx="24" cy="22" rx="5" ry="6" fill="#c9a96e" opacity="0.9"/>
  <ellipse cx="40" cy="22" rx="5" ry="6" fill="#c9a96e" opacity="0.9"/>
  <!-- Eye facets (compound eye detail) -->
  <circle cx="23" cy="20" r="1.2" fill="#e8d5b7"/>
  <circle cx="26" cy="21" r="1" fill="#e8d5b7" opacity="0.8"/>
  <circle cx="23" cy="24" r="1" fill="#e8d5b7" opacity="0.7"/>
  <circle cx="39" cy="20" r="1.2" fill="#e8d5b7"/>
  <circle cx="42" cy="21" r="1" fill="#e8d5b7" opacity="0.8"/>
  <circle cx="39" cy="24" r="1" fill="#e8d5b7" opacity="0.7"/>
  <!-- Head shield (cephalon) -->
  <path d="M 16 26 Q 32 12 48 26" fill="none" stroke="#c9a96e" stroke-width="2"/>
</svg>
